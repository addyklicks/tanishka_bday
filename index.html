<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Tanishka has turned ONE 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Playfair+Display:wght@700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;height:-webkit-fill-available;}
body{
  width:100%;height:100%;height:-webkit-fill-available;
  display:flex;align-items:center;justify-content:center;
  background:#f0c8dc;overflow:hidden;
  position:fixed;top:0;left:0;right:0;bottom:0;
}
.scene{
  width:min(460px,100vw);
  height:min(820px,100dvh);
  position:relative;overflow:hidden;
  border-radius:clamp(0px,2vw,22px);
  box-shadow:0 24px 70px rgba(150,50,100,0.4);
  touch-action:manipulation;
  user-select:none;-webkit-user-select:none;
}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;pointer-events:none;}
.fade-top{position:absolute;top:0;left:0;right:0;height:38%;z-index:1;pointer-events:none;background:linear-gradient(to bottom,rgba(255,230,245,0.22) 0%,transparent 100%);}
.fade-bottom{position:absolute;bottom:0;left:0;right:0;height:52%;z-index:1;pointer-events:none;background:linear-gradient(to bottom,transparent 0%,rgba(255,228,244,0.70) 38%,rgba(255,220,242,0.94) 100%);}

/* Fall layer */
.fall-layer{position:absolute;inset:0;z-index:3;pointer-events:none;overflow:hidden;}
.petal{position:absolute;top:-60px;opacity:0;animation:petalFall linear infinite;}
@keyframes petalFall{
  0%{transform:translateY(0) rotate(0deg) translateX(0);opacity:0;}5%{opacity:0.88;}
  50%{transform:translateY(440px) rotate(200deg) translateX(16px);}80%{opacity:0.65;}
  100%{transform:translateY(105vh) rotate(480deg) translateX(-14px);opacity:0;}
}
.sparkle{position:absolute;top:-10px;opacity:0;border-radius:50%;animation:sparkleFall linear infinite;}
@keyframes sparkleFall{0%{opacity:0;transform:translateY(0);}8%{opacity:1;}90%{opacity:0.4;}100%{opacity:0;transform:translateY(105vh);}}
.star-p{position:absolute;top:-15px;opacity:0;animation:starDrift linear infinite;}
@keyframes starDrift{0%{opacity:0;transform:translateY(0) rotate(0deg);}7%{opacity:0.85;}85%{opacity:0.35;}100%{opacity:0;transform:translateY(105vh) rotate(360deg);}}
.conf{position:absolute;top:-12px;opacity:0;border-radius:2px;animation:confFall linear infinite;}
@keyframes confFall{0%{opacity:0;transform:translateY(0) rotate(0deg);}6%{opacity:0.8;}100%{opacity:0;transform:translateY(105vh) rotate(720deg);}}

/* Tap overlay */
.tap-overlay{
  position:absolute;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding-bottom:clamp(32px,6vh,56px);
  background:rgba(255,220,240,0.12);
  transition:opacity 0.8s ease;
}
.tap-overlay.hidden{opacity:0;pointer-events:none;}
.tap-icon{font-size:clamp(24px,6vw,32px);margin-bottom:8px;animation:tapPulse 2s ease-in-out infinite;}
.tap-hint{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(13px,3.5vw,16px);color:rgba(150,50,100,0.92);
  letter-spacing:2px;text-align:center;
  background:rgba(255,245,252,0.82);
  padding:clamp(8px,2vw,12px) clamp(18px,5vw,28px);
  border-radius:30px;border:1px solid rgba(220,150,190,0.5);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  animation:tapPulse 2s ease-in-out infinite;
}
@keyframes tapPulse{0%,100%{transform:scale(1);opacity:0.85;}50%{transform:scale(1.04);opacity:1;}}

/* Music pill */
.music-status{
  position:absolute;top:clamp(8px,2vw,14px);right:clamp(8px,2vw,14px);z-index:10;
  background:rgba(255,240,250,0.85);border:1px solid rgba(210,140,185,0.6);
  border-radius:20px;padding:6px 14px;
  font-family:'Cormorant Garamond',serif;font-size:clamp(11px,2.8vw,13px);
  color:#a04070;letter-spacing:1px;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  display:flex;align-items:center;gap:6px;
  box-shadow:0 2px 10px rgba(180,80,130,0.15);
  transition:all 0.4s ease;cursor:pointer;
  min-width:44px;min-height:36px;
}
.music-dot{width:7px;height:7px;border-radius:50%;background:#d06090;transition:background 0.3s;flex-shrink:0;}
.music-status.playing .music-dot{background:#40c060;animation:dotPulse 1s ease-in-out infinite;}
@keyframes dotPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.4);}}

/* Content */
.content{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;pointer-events:none;overflow:hidden;}

/* Title */
.title-wrap{width:100%;text-align:center;padding-top:clamp(20px,5vh,42px);flex-shrink:0;opacity:0;animation:fadeDown 1.4s ease forwards 0.8s;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
.t-name{font-family:'Fredoka One',cursive;font-size:clamp(36px,9.5vw,62px);color:#d4900a;text-shadow:-2px -2px 0 #7a4400,2px -2px 0 #7a4400,-2px 2px 0 #7a4400,2px 2px 0 #7a4400,0 6px 14px rgba(140,70,0,0.2);line-height:1.0;letter-spacing:1px;}
.t-sub{font-family:'Fredoka One',cursive;font-size:clamp(18px,4.5vw,30px);color:#d4900a;text-shadow:-1.5px -1.5px 0 #7a4400,1.5px -1.5px 0 #7a4400,-1.5px 1.5px 0 #7a4400,1.5px 1.5px 0 #7a4400;line-height:1.1;}
.t-one{font-family:'Fredoka One',cursive;font-size:clamp(46px,11.5vw,78px);color:#f5d050;text-shadow:-3px -3px 0 #8a5c00,3px -3px 0 #8a5c00,-3px 3px 0 #8a5c00,3px 3px 0 #8a5c00,0 8px 18px rgba(140,80,0,0.25);line-height:0.95;opacity:0;animation:onePop 1s cubic-bezier(0.34,1.56,0.64,1) forwards 1.8s;}
@keyframes onePop{from{opacity:0;transform:scale(0.3) rotate(-10deg);}to{opacity:1;transform:scale(1) rotate(0deg);}}

/* Main portrait */
.main-portrait{position:relative;width:clamp(130px,36vw,172px);height:clamp(130px,36vw,172px);margin-top:clamp(6px,1.5vh,12px);flex-shrink:0;opacity:0;animation:portraitReveal 1.6s cubic-bezier(0.22,1,0.36,1) forwards 2.4s;}
@keyframes portraitReveal{from{opacity:0;transform:scale(0.5);}to{opacity:1;transform:scale(1);}}
.ring-spin{position:absolute;inset:-10px;border-radius:50%;border:3px solid transparent;border-top-color:#f0c040;border-right-color:#e8a828;border-bottom-color:#f0c040;animation:spinR 8s linear infinite;}
@keyframes spinR{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.ring-dash{position:absolute;inset:-4px;border-radius:50%;border:2px dashed rgba(240,192,64,0.45);animation:spinR 12s linear infinite reverse;}
.gold-ring{position:absolute;inset:-6px;border-radius:50%;border:4px solid #e8b830;box-shadow:0 0 0 2px rgba(240,192,64,0.3),0 0 18px rgba(240,160,80,0.3);}
.main-portrait img{width:100%;height:100%;border-radius:50%;object-fit:cover;object-position:center top;display:block;}
.portrait-crown{position:absolute;top:-26px;left:50%;transform:translateX(-50%);font-size:clamp(20px,5.5vw,28px);z-index:2;animation:crownBob 2.5s ease-in-out infinite;filter:drop-shadow(0 2px 4px rgba(200,140,0,0.4));}
@keyframes crownBob{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-7px);}}
.gdot{position:absolute;width:clamp(7px,2vw,9px);height:clamp(7px,2vw,9px);border-radius:50%;box-shadow:0 0 5px rgba(240,192,64,0.6);}

/* Photo strip */
.photo-strip{display:flex;align-items:center;justify-content:center;margin-top:clamp(12px,2vh,18px);flex-shrink:0;position:relative;height:clamp(90px,14vh,118px);width:92%;opacity:0;animation:fadeUp 1.2s ease forwards 3.4s;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.sub-photo{position:absolute;width:clamp(72px,20vw,95px);height:clamp(80px,22vw,106px);border-radius:12px;border:3px solid white;box-shadow:0 4px 14px rgba(160,60,100,0.28);object-fit:cover;object-position:center top;}
.sub-photo.p1{left:50%;margin-left:clamp(-118px,-32vw,-100px);transform:rotate(-9deg);z-index:1;}
.sub-photo.p2{left:50%;margin-left:clamp(-40px,-10vw,-36px);transform:rotate(0deg);z-index:3;width:clamp(80px,22vw,104px);height:clamp(88px,24vw,114px);border:3.5px solid white;box-shadow:0 6px 20px rgba(160,60,100,0.35);}
.sub-photo.p3{left:50%;margin-left:clamp(28px,7vw,38px);transform:rotate(8deg);z-index:2;}

.strip-label{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(10px,2.5vw,12px);color:#b06090;letter-spacing:1.5px;margin-top:clamp(4px,1vh,8px);flex-shrink:0;opacity:0;animation:fadeUp 1s ease forwards 4s;}

/* Bottom card */
.bottom-card{width:90%;margin-top:clamp(6px,1.5vh,12px);margin-bottom:clamp(10px,2.5vh,20px);background:rgba(255,245,252,0.84);border:1.5px solid rgba(220,160,200,0.55);border-radius:18px;padding:clamp(10px,2vh,14px) clamp(14px,4vw,22px);text-align:center;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);opacity:0;animation:fadeUp 1.4s ease forwards 4.4s;pointer-events:all;flex-shrink:0;}
.inv-label{font-family:'Cormorant Garamond',serif;font-size:clamp(9px,2.4vw,12px);letter-spacing:3px;text-transform:uppercase;color:#b06090;margin-bottom:2px;}
.hosts{font-family:'Playfair Display',serif;font-size:clamp(15px,4vw,22px);font-weight:700;color:#7a2050;margin-bottom:clamp(6px,1.5vh,10px);}
.divrow{display:flex;align-items:center;gap:8px;margin:0 auto clamp(6px,1.5vh,10px);width:80%;}
.divline{flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(200,120,170,0.7),transparent);}
.divgem{width:7px;height:7px;background:#d060b0;transform:rotate(45deg);flex-shrink:0;}
.drow{display:flex;align-items:flex-start;justify-content:center;gap:7px;margin-bottom:clamp(4px,1vh,7px);}
.drow:last-of-type{margin-bottom:0;}
.dicon{font-size:clamp(11px,3vw,14px);flex-shrink:0;margin-top:2px;}
.dtxt{font-family:'Cormorant Garamond',serif;font-size:clamp(11px,2.8vw,14.5px);color:#7a3060;line-height:1.4;text-align:left;}
.dtxt strong{font-weight:600;color:#5a1840;}
.footer-line{margin-top:clamp(5px,1.2vh,8px);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(9px,2.2vw,12px);color:#c080b0;letter-spacing:1.2px;}
</style>
</head>

  <div class="fade-top"></div>

    <!-- Strip = picture2, picture3, picture4 -->

      <img class="sub-photo p1" id="s1El" alt=""/>

    <div class="bottom-card">
      <div class="inv-label">✦ You are cordially invited ✦</div>

      <div class="divrow">
        <div class="divline"></div>
        <div class="divgem"></div>
        <div class="divgem" style="width:5px;height:5px;background:#f0c040;"></div>
        <div class="divgem"></div>
        <div class="divline"></div>
      </div>
      <div class="drow">
        <span class="dicon">📍</span>
        <div class="dtxt"><strong>Kaushal Regency, Pachpadra</strong><br>Jodhpur Road</div>
      </div>
      <div class="drow">
        <span class="dicon">📅</span>
        <div class="dtxt"><strong>28th March</strong> &nbsp;|&nbsp; <strong>7:00 PM</strong></div>
      </div>
      <div class="footer-line">♛ &nbsp; Come celebrate our little princess &nbsp; ♛</div>
    </div>
  </div>

  <audio id="bgm" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg"/>
  </audio>
</div>

// ── Photos loaded from folder — just rename files to swap! ──
// picture1 = main portrait (big circle)
// picture2 = strip left
// picture3 = strip center
// picture4 = strip right
var exts = ['jpg','jpeg','png','webp'];
function tryLoad(el, base, i){
  if(i >= exts.length){ console.warn('Could not load ' + base); return; }
  var img = new Image();
  img.onload = function(){ el.src = img.src; };
  img.onerror = function(){ tryLoad(el, base, i+1); };
  img.src = base + '.' + exts[i];
}
tryLoad(document.getElementById('mainEl'), 'picture1', 0);
tryLoad(document.getElementById('s1El'),   'picture2', 0);
tryLoad(document.getElementById('s2El'),   'picture3', 0);
tryLoad(document.getElementById('s3El'),   'picture4', 0);

// ── Music ──
var bgm = document.getElementById('bgm');
var tapOverlay = document.getElementById('tapOverlay');
var musicStatus = document.getElementById('musicStatus');
var musicLabel = document.getElementById('musicLabel');
var musicStarted = false, musicPlaying = false;

function fadeInMusic(){
  var v=0, fi=setInterval(function(){
    v=Math.min(v+0.03,0.5); bgm.volume=v;
    if(v>=0.5) clearInterval(fi);
  },100);
}

function startMusic(){
  if(musicStarted) return;
  musicStarted = true;
  tapOverlay.classList.add('hidden');
  setTimeout(function(){ tapOverlay.style.display='none'; }, 900);
  bgm.volume = 0;
  var p = bgm.play();
  if(p !== undefined){
    p.then(function(){
      musicPlaying = true;
      musicStatus.classList.add('playing');
      musicLabel.textContent = 'music on';
      fadeInMusic();
    }).catch(function(){
      musicStarted = false;
      tapOverlay.classList.remove('hidden');
      tapOverlay.style.display = 'flex';
    });
  }
}

function toggleMusic(){
  if(!musicStarted){ startMusic(); return; }
  if(musicPlaying){
    var v = bgm.volume;
    var fo = setInterval(function(){
      v = Math.max(v-0.04,0); bgm.volume = v;
      if(v<=0){ clearInterval(fo); bgm.pause(); musicPlaying=false;
        musicStatus.classList.remove('playing'); musicLabel.textContent='music off'; }
    },80);
  } else {
    bgm.volume=0;
    bgm.play().then(function(){
      musicPlaying=true; musicStatus.classList.add('playing');
      musicLabel.textContent='music on'; fadeInMusic();
    });
  }
}

var scene = document.getElementById('scene');
scene.addEventListener('click',     function(){ if(!musicStarted) startMusic(); });
scene.addEventListener('touchstart',function(){ if(!musicStarted) startMusic(); },{passive:true});
musicStatus.addEventListener('click',     function(e){ e.stopPropagation(); toggleMusic(); });
musicStatus.addEventListener('touchstart',function(e){ e.stopPropagation(); toggleMusic(); },{passive:true});

// ── Portrait resize on orientation change ──
function resizePortrait(){
  var size = Math.min(Math.round(window.innerWidth*0.36),172);
  size = Math.max(size,130);
  var p = document.getElementById('mainPortrait');
  p.style.width = size+'px'; p.style.height = size+'px';
}
window.addEventListener('resize', resizePortrait);
window.addEventListener('orientationchange', resizePortrait);
resizePortrait();

var glitter=['#f8d060','#f0b0d8','#c0d8f8','#f8c8e8','#ffc8a8','#e8c0f8','#d0f0c0'];
function r(a,b){return Math.random()*(b-a)+a;}
function spawnPetal(){
  var el=document.createElement('div');el.className='petal';
  el.innerHTML=petalSVGs[Math.floor(Math.random()*petalSVGs.length)];
  el.style.left=r(0,93)+'%';var dur=r(11,20),delay=r(0,16);
  el.style.animationDuration=dur+'s';el.style.animationDelay=delay+'s';
  el.style.transform='rotate('+r(0,360)+'deg)';
  layer.appendChild(el);setTimeout(function(){if(el.parentNode)el.remove();},(dur+delay+2)*1000);
}
function spawnSparkle(){
  var el=document.createElement('div');el.className='sparkle';
  el.style.left=r(0,97)+'%';el.style.background=glitter[Math.floor(Math.random()*glitter.length)];
  var sz=r(3,9);el.style.width=sz+'px';el.style.height=sz+'px';
  el.style.borderRadius=Math.random()>0.5?'50%':'2px';
  var dur=r(8,16),delay=r(0,14);
  el.style.animationDuration=dur+'s';el.style.animationDelay=delay+'s';
  layer.appendChild(el);setTimeout(function(){if(el.parentNode)el.remove();},(dur+delay+2)*1000);
}
function spawnStar(){
  var el=document.createElement('div');el.className='star-p';
  el.textContent=Math.random()>0.5?'★':'✦';
  el.style.left=r(0,95)+'%';el.style.color=Math.random()>0.4?'#f0c040':'#e090c0';
  el.style.fontSize=r(9,17)+'px';
  var dur=r(10,18),delay=r(0,15);
  el.style.animationDuration=dur+'s';el.style.animationDelay=delay+'s';
  layer.appendChild(el);setTimeout(function(){if(el.parentNode)el.remove();},(dur+delay+2)*1000);
}
function spawnConf(){
  var el=document.createElement('div');el.className='conf';
  el.style.left=r(0,96)+'%';el.style.background=glitter[Math.floor(Math.random()*glitter.length)];
  el.style.width=r(5,10)+'px';el.style.height=r(8,14)+'px';
  var dur=r(9,17),delay=r(0,14);
  el.style.animationDuration=dur+'s';el.style.animationDelay=delay+'s';
  layer.appendChild(el);setTimeout(function(){if(el.parentNode)el.remove();},(dur+delay+2)*1000);
}
for(var i=0;i<20;i++)spawnPetal();
for(var i=0;i<35;i++)spawnSparkle();
for(var i=0;i<22;i++)spawnStar();

setInterval(spawnPetal,800);setInterval(spawnSparkle,350);
setInterval(spawnStar,600);setInterval(spawnConf,550);
